<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Prefix Sum: prefix[i] = a[0] + a[1] + ... + a[i-1]</text>
  <rect x="30" y="50" width="60" height="40" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <rect x="100" y="50" width="60" height="40" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <rect x="170" y="50" width="60" height="40" fill="#FF9800" stroke="#333" stroke-width="2"/>
  <rect x="240" y="50" width="60" height="40" fill="#f44336" stroke="#333" stroke-width="2"/>
  <rect x="310" y="50" width="60" height="40" fill="#9C27B0" stroke="#333" stroke-width="2"/>
  <text x="60" y="75" text-anchor="middle" fill="white" font-weight="bold">3</text>
  <text x="130" y="75" text-anchor="middle" fill="white" font-weight="bold">1</text>
  <text x="200" y="75" text-anchor="middle" fill="white" font-weight="bold">4</text>
  <text x="270" y="75" text-anchor="middle" fill="white" font-weight="bold">2</text>
  <text x="340" y="75" text-anchor="middle" fill="white" font-weight="bold">5</text>
  <text x="60" y="105" text-anchor="middle" font-size="10" fill="#333">a[0]</text>
  <text x="130" y="105" text-anchor="middle" font-size="10" fill="#333">a[1]</text>
  <text x="200" y="105" text-anchor="middle" font-size="10" fill="#333">a[2]</text>
  <text x="270" y="105" text-anchor="middle" font-size="10" fill="#333">a[3]</text>
  <text x="340" y="105" text-anchor="middle" font-size="10" fill="#333">a[4]</text>
  <rect x="30" y="130" width="60" height="40" fill="#E8F5E9" stroke="#333" stroke-width="2"/>
  <rect x="100" y="130" width="60" height="40" fill="#E3F2FD" stroke="#333" stroke-width="2"/>
  <rect x="170" y="130" width="60" height="40" fill="#FFF3E0" stroke="#333" stroke-width="2"/>
  <rect x="240" y="130" width="60" height="40" fill="#FFEBEE" stroke="#333" stroke-width="2"/>
  <rect x="310" y="130" width="60" height="40" fill="#F3E5F5" stroke="#333" stroke-width="2"/>
  <text x="60" y="155" text-anchor="middle" fill="#333" font-weight="bold">0</text>
  <text x="130" y="155" text-anchor="middle" fill="#333" font-weight="bold">3</text>
  <text x="200" y="155" text-anchor="middle" fill="#333" font-weight="bold">4</text>
  <text x="270" y="155" text-anchor="middle" fill="#333" font-weight="bold">8</text>
  <text x="340" y="155" text-anchor="middle" fill="#333" font-weight="bold">10</text>
  <text x="60" y="185" text-anchor="middle" font-size="10" fill="#333">prefix[0]</text>
  <text x="130" y="185" text-anchor="middle" font-size="10" fill="#333">prefix[1]</text>
  <text x="200" y="185" text-anchor="middle" font-size="10" fill="#333">prefix[2]</text>
  <text x="270" y="185" text-anchor="middle" font-size="10" fill="#333">prefix[3]</text>
  <text x="340" y="185" text-anchor="middle" font-size="10" fill="#333">prefix[4]</text>
  <text x="430" y="100" font-size="12" fill="#e91e63">Sum[1..3] = prefix[4] - prefix[1]</text>
  <text x="430" y="120" font-size="12" fill="#e91e63">= 10 - 3 = 7</text>
</svg>
