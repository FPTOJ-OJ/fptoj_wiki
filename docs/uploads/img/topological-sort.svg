  <circle cx="150" cy="150" r="20" fill="#2196F3" stroke="#333" stroke-width="2"/><text x="150" y="155" text-anchor="middle" fill="white" font-weight="bold">2</text>
  <circle cx="250" cy="100" r="20" fill="#FF9800" stroke="#333" stroke-width="2"/><text x="250" y="105" text-anchor="middle" fill="white" font-weight="bold">3</text>
