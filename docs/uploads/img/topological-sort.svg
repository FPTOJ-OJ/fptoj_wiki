<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker></defs>
  <circle cx="50" cy="100" r="20" fill="#4CAF50" stroke="#333" stroke-width="2"/><text x="50" y="105" text-anchor="middle" fill="white" font-weight="bold">5</text>
