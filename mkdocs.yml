site_name: FPTOJ WIKI
site_url: https://wiki.fptoj.com
site_description: 'FPTOJ được xây dựng với mục đích chia sẻ kiến thức Tin học đến với tất cả mọi người'

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.footer        
    - navigation.tracking     
    - toc.sticky          
    - search.suggest         
    - search.highlight          
    - content.code.copy         
    - content.code.annotate   
    - content.code.language    
    - content.tabs.link        
    - header.autohide         

  logo: uploads/icon.svg
  favicon: uploads/favicon.ico
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default  
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang chế độ tối
    - scheme: slate  
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Chuyển sang chế độ sáng

repo_url: https://github.com/FPTOJ-OJ/fptoj_wiki
repo_name: FPTOJ-OJ/fptoj_wiki
edit_uri: edit/master/docs

